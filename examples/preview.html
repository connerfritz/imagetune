<!doctype html>
<!--
  Self-contained smoke-test page for ImageTune v2.
  Built from the modernize-v2 branch — no external dependencies, no
  network access required after load. Open in any modern browser.

  This file is a build artifact for PR review. It is NOT part of the
  published library. Will be removed before merge.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ImageTune v2 — preview</title>
    <style>
      :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
      body { margin: 0; padding: 1.5rem; max-width: 900px; }
      h1 { margin-top: 0; }
      fieldset { border: 1px solid currentColor; border-radius: 4px; padding: 1rem; margin-bottom: 1rem; }
      legend { padding: 0 0.5rem; font-weight: 600; }
      label { display: inline-block; margin-right: 1rem; }
      input[type="number"] { width: 5rem; }
      .panes { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; align-items: start; }
      .pane { padding: 0.75rem; border: 1px dashed currentColor; border-radius: 4px; min-height: 200px; }
      .pane h3 { margin: 0 0 0.5rem; font-size: 0.95rem; }
      .pane img { max-width: 100%; height: auto; display: block; }
      .meta { font-family: ui-monospace, monospace; font-size: 0.85rem; opacity: 0.8; margin-top: 0.5rem; }
      .ratio { font-weight: 600; }
      .ratio.win { color: #2a8f2a; }
      .ratio.loss { color: #c44; }
      button { padding: 0.5rem 1rem; cursor: pointer; }
      .err { color: #c44; white-space: pre-wrap; font-family: ui-monospace, monospace; font-size: 0.85rem; }
    </style>
  </head>
  <body>
    <h1>ImageTune v2 preview</h1>
    <p>Pick an image and adjust the options. The library re-encodes it client-side; nothing is uploaded.</p>

    <fieldset>
      <legend>Input</legend>
      <input id="file" type="file" accept="image/*" />
    </fieldset>

    <fieldset>
      <legend>Options</legend>
      <label>Format
        <select id="type">
          <option value="webp" selected>webp</option>
          <option value="jpeg">jpeg</option>
          <option value="png">png</option>
        </select>
      </label>
      <label>Quality <input id="quality" type="number" min="1" max="100" value="80" /></label>
      <label>Width <input id="width" type="number" min="1" value="500" /></label>
      <label>Height <input id="height" type="number" min="1" value="500" /></label>
      <label>Mode
        <select id="mode">
          <option value="scale" selected>scale (contain)</option>
          <option value="crop">crop (cover)</option>
        </select>
      </label>
      <button id="run" type="button">Tune</button>
    </fieldset>

    <div id="err" class="err"></div>

    <div class="panes">
      <div class="pane">
        <h3>Original</h3>
        <img id="orig" alt="" />
        <div id="origMeta" class="meta"></div>
      </div>
      <div class="pane">
        <h3>Tuned</h3>
        <img id="out" alt="" />
        <div id="outMeta" class="meta"></div>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const fileInput = $('file'),
            origImg = $('orig'),
            outImg = $('out'),
            origMeta = $('origMeta'),
            outMeta = $('outMeta'),
            errBox = $('err'),
            runBtn = $('run');

      let pickedFile = null;
      let lastOrigUrl = null;
      let lastOutUrl = null;

      const fmtKB = (n) => `${(n / 1024).toFixed(1)} KiB`;

      fileInput.addEventListener('change', (evt) => {
        pickedFile = evt.target.files[0] ?? null;
        if (!pickedFile) return;
        if (lastOrigUrl) URL.revokeObjectURL(lastOrigUrl);
        lastOrigUrl = URL.createObjectURL(pickedFile);
        origImg.src = lastOrigUrl;
        origMeta.textContent = `${pickedFile.name} — ${pickedFile.type || 'unknown'} — ${fmtKB(pickedFile.size)}`;
      });

      runBtn.addEventListener('click', async () => {
        errBox.textContent = '';
        if (!pickedFile) {
          errBox.textContent = 'Pick an image first.';
          return;
        }
        const opts = {
          type: $('type').value,
          quality: Number($('quality').value),
          width: Number($('width').value),
          height: Number($('height').value),
          mode: $('mode').value,
        };
        const t0 = performance.now();
        try {
          const blob = await ImageTune.tune(pickedFile, opts);
          const dt = (performance.now() - t0).toFixed(0);
          if (lastOutUrl) URL.revokeObjectURL(lastOutUrl);
          lastOutUrl = URL.createObjectURL(blob);
          outImg.src = lastOutUrl;

          const ratio = blob.size / pickedFile.size;
          const cls = ratio < 1 ? 'win' : 'loss';
          const pct = ((1 - ratio) * 100).toFixed(0);
          outMeta.innerHTML =
            `${blob.type} — ${fmtKB(blob.size)} — ${dt}ms — ` +
            `<span class="ratio ${cls}">${ratio < 1 ? `${pct}% smaller` : `${(-pct)}% larger`}</span>`;
        } catch (e) {
          errBox.textContent = `Error: ${e?.message ?? e}`;
          console.error(e);
        }
      });
    </script>
  </body>
</html>
