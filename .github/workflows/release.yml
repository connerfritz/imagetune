name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write # required for npm provenance

jobs:
  release:
    if: github.repository == 'connerfritz/imagetune'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # No `registry-url` here: it would write an .npmrc keyed to
          # NODE_AUTH_TOKEN, which short-circuits Trusted Publishing by
          # giving npm a stale token to use instead of OIDC.
          #
          # Node 24, not 22: Trusted Publishing requires npm CLI >=11.5
          # and Node 22 still ships with npm 10.9.x in the GHA hosted
          # toolcache. The library's `engines.node` is independent (>=20).
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm rebuild
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      # Run the real-Chromium smoke suite before publishing — node-mode
      # tests use stubs and can't catch a genuine encoder regression.
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium
      - if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium
      - run: pnpm test:browser
      - run: pnpm build
      - run: pnpm verify-package
      - name: Verify dist artifacts before publish
        run: |
          test -s dist/index.js
          test -s dist/index.cjs
          test -s dist/index.global.js
          test -s dist/index.d.ts
          test -s dist/index.d.cts
      - name: Release (npm Trusted Publishing via OIDC)
        # No NPM_TOKEN: @semantic-release/npm is configured with
        # `npmPublish: false` in .releaserc.json, which makes it skip
        # both the auth check and the publish step (see its index.js
        # `verifyConditions`: auth is only verified when npmPublish !==
        # false). The actual publish runs via @semantic-release/exec
        # invoking `npm publish --provenance --access public`, which
        # uses the npm CLI's native Trusted Publishing OIDC flow —
        # provided the package is configured on npmjs.com to trust this
        # repo+workflow. We'll fold this back into @semantic-release/npm
        # whenever it ships native TP support.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec semantic-release
